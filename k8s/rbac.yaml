apiVersion: v1
kind: Namespace
metadata:
  name: digital-twin-fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: twin-operator
  namespace: digital-twin-fleet
rules:
- apiGroups: ["kubeflow.org"]
  resources: ["pytorchjobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: twin-operator-binding
  namespace: digital-twin-fleet
subjects:
- kind: ServiceAccount
  name: default
  namespace: digital-twin-fleet
roleRef:
  kind: Role
  name: twin-operator
  apiGroup: rbac.authorization.k8s.io
